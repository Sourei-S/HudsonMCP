monitored_files:
  - .env
  - .env.local
  - .env.production
  - "*.pem"
  - "*.key"
  - id_rsa
  - id_ed25519
  - credentials.json
  - service-account.json
  - "config/secrets.*"
  - secrets.yaml
  - secrets.yml
  - .envrc
  - .npmrc
  - .pypirc
  - docker-compose.override.yml
value_patterns:            # secret_exposure 検出用（露出した実値の形）
  - "AKIA[0-9A-Z]{16}"                       # AWS access key id
  - "(?i)aws_secret_access_key\\s*=\\s*\\S+"
  - "sk-[A-Za-z0-9]{20,}"                    # OpenAI 系
  - "ghp_[A-Za-z0-9]{36}"                    # GitHub PAT
  - "xox[baprs]-[A-Za-z0-9-]{10,}"           # Slack
  - "-----BEGIN [A-Z ]*PRIVATE KEY-----"
  - "(?i)(api[_-]?key|token|secret|password)\\s*[:=]\\s*['\\\"]?[A-Za-z0-9_\\-]{12,}"
  - "DefaultEndpointsProtocol=https.*AccountKey=[A-Za-z0-9+/=]{50,}"  # Azure Storage
  - "AIza[0-9A-Za-z\\-_]{35}"                                          # GCP API key
  - "\\$\\{\\{\\s*secrets\\.[A-Z_][A-Z0-9_]+\\s*\\}\\}"               # GitHub Actions secrets ref
  - "(?i)_authToken\\s*=\\s*[A-Za-z0-9._-]{20,}"                       # npm auth token
  - "(?i)PRIVATE_KEY_ID[\"']?\\s*:\\s*[\"']?[a-f0-9]{40}"              # GCP SA key id
key_name_patterns:         # secret_propagation 検出用（キー名の伝播）。語境界で部分一致誤発火を抑制
  - "(?i)\\bapi[_-]?keys?\\b"
  - "(?i)\\bsecrets?\\b"
  - "(?i)\\btokens?\\b"
  - "(?i)\\bpasswords?\\b"
  - "(?i)\\bprivate[_-]?keys?\\b"
allowed_after_access:
  - 秘密値を表示しない
  - 秘密値を保存しない
  - 秘密値を要約しない
  - キー名のみ扱う
  - 構造のみ説明する
  - 値は <REDACTED> に置換する
